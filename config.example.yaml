model_list:
  # ── Groq Models (each model rotates across all your Groq keys) ──

  # Llama 3.3 70B — flagship, fast chat & coding
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: gsk_example_key_1
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: gsk_example_key_2

  # Llama 3.1 8B — ultra-fast, lightweight tasks
  - model_name: groq-llama-small
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: gsk_example_key_1
  - model_name: groq-llama-small
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: gsk_example_key_2

  # Llama 4 Scout — fast multimodal (vision + text)
  - model_name: groq-scout
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: gsk_example_key_1

  # GPT-OSS 120B — best reasoning, flagship open model
  - model_name: groq-gpt-oss
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: gsk_example_key_1

  # GPT-OSS 20B — fastest, good quality small model
  - model_name: groq-gpt-oss-mini
    litellm_params:
      model: groq/openai/gpt-oss-20b
      api_key: gsk_example_key_1

  # Qwen3 32B — strong multilingual & reasoning
  - model_name: groq-qwen
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: gsk_example_key_1

  # Kimi K2 — 262K context, agentic coding
  - model_name: groq-kimi
    litellm_params:
      model: groq/moonshotai/kimi-k2-instruct-0905
      api_key: gsk_example_key_1

  # ── Gemini Models ──

  # Gemini 2.0 Flash — vision & long context
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: AIzaSy_example_key_1
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: AIzaSy_example_key_2

  # Gemini Image Generation (Imagen 3)
  - model_name: gemini-image
    litellm_params:
      model: gemini/nano-banana-pro-preview
      api_key: AIzaSy_example_key_1

litellm_settings:
  drop_params: true
  num_retries: 5
  set_fastapi_logging: false

router_settings:
  routing_strategy: simple-shuffle
  allowed_fails: 1
  cooldown_time: 60
